<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="780" viewBox="0 0 1200 780" role="img" aria-labelledby="title desc">
  <title id="title">QuizSolver workflow preview</title>
  <desc id="desc">A browser quiz page beside the QuizSolver side panel, showing question detection, FocusScan and saved explanations.</desc>
  <defs>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#111827"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#8b5cf6"/>
    </linearGradient>
    <filter id="shadow" x="-8%" y="-8%" width="116%" height="116%">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#020617" flood-opacity="0.45"/>
    </filter>
  </defs>

  <rect width="1200" height="780" rx="34" fill="#07111f"/>
  <rect x="38" y="38" width="1124" height="704" rx="28" fill="#0b1220" stroke="#223047" stroke-width="2"/>

  <g filter="url(#shadow)">
    <rect x="78" y="92" width="710" height="590" rx="22" fill="#f8fafc"/>
    <rect x="78" y="92" width="710" height="58" rx="22" fill="#e2e8f0"/>
    <rect x="78" y="128" width="710" height="22" fill="#e2e8f0"/>
    <circle cx="116" cy="121" r="8" fill="#ef4444"/>
    <circle cx="144" cy="121" r="8" fill="#f59e0b"/>
    <circle cx="172" cy="121" r="8" fill="#22c55e"/>
    <rect x="215" y="106" width="355" height="30" rx="15" fill="#ffffff"/>
    <text x="238" y="126" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" fill="#334155">quiz platform page</text>

    <rect x="122" y="190" width="620" height="74" rx="14" fill="#e0f2fe" stroke="#bae6fd"/>
    <text x="152" y="222" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800" fill="#0f172a">Question 7</text>
    <text x="152" y="248" font-family="Inter, Arial, sans-serif" font-size="18" fill="#334155">Which process converts light energy into chemical energy?</text>

    <g fill="#ffffff" stroke="#cbd5e1" stroke-width="2">
      <rect x="122" y="296" width="620" height="62" rx="14"/>
      <rect x="122" y="374" width="620" height="62" rx="14"/>
      <rect x="122" y="452" width="620" height="62" rx="14"/>
      <rect x="122" y="530" width="620" height="62" rx="14"/>
    </g>
    <circle cx="160" cy="327" r="10" fill="#f8fafc" stroke="#64748b" stroke-width="3"/>
    <circle cx="160" cy="405" r="10" fill="#f8fafc" stroke="#64748b" stroke-width="3"/>
    <circle cx="160" cy="483" r="10" fill="#f8fafc" stroke="#64748b" stroke-width="3"/>
    <circle cx="160" cy="561" r="10" fill="#f8fafc" stroke="#64748b" stroke-width="3"/>
    <text x="190" y="333" font-family="Inter, Arial, sans-serif" font-size="18" fill="#1e293b">Respiration</text>
    <text x="190" y="411" font-family="Inter, Arial, sans-serif" font-size="18" fill="#1e293b">Photosynthesis</text>
    <text x="190" y="489" font-family="Inter, Arial, sans-serif" font-size="18" fill="#1e293b">Fermentation</text>
    <text x="190" y="567" font-family="Inter, Arial, sans-serif" font-size="18" fill="#1e293b">Transpiration</text>

    <rect x="111" y="178" width="642" height="426" rx="22" fill="none" stroke="#22d3ee" stroke-width="5" stroke-dasharray="16 12"/>
    <rect x="560" y="612" width="182" height="38" rx="19" fill="#0f172a"/>
    <text x="586" y="636" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="800" fill="#f8fafc">FocusScan area</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="828" y="92" width="292" height="590" rx="24" fill="url(#panel)" stroke="#24324a" stroke-width="2"/>
    <rect x="852" y="118" width="244" height="68" rx="17" fill="#111827" stroke="#334155"/>
    <rect x="870" y="135" width="38" height="38" rx="12" fill="url(#accent)"/>
    <path d="M889 145 L881 160 H891 L884 176 L899 156 H889 L896 145 Z" fill="#ffffff"/>
    <text x="922" y="148" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="900" fill="#f8fafc">QuizSolver</text>
    <text x="922" y="171" font-family="Inter, Arial, sans-serif" font-size="13" fill="#93c5fd">AI quiz helper</text>

    <rect x="852" y="214" width="244" height="72" rx="16" fill="#101827" stroke="#334155"/>
    <text x="872" y="240" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="800" fill="#94a3b8">STEP 1</text>
    <text x="872" y="266" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="900" fill="#f8fafc">Detect question</text>

    <rect x="852" y="310" width="244" height="72" rx="16" fill="#101827" stroke="#334155"/>
    <text x="872" y="336" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="800" fill="#94a3b8">STEP 2</text>
    <text x="872" y="362" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="900" fill="#f8fafc">Suggest answer</text>

    <rect x="852" y="406" width="244" height="118" rx="16" fill="#12251f" stroke="#16a34a"/>
    <text x="872" y="432" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="800" fill="#86efac">LIKELY ANSWER</text>
    <text x="872" y="465" font-family="Inter, Arial, sans-serif" font-size="25" font-weight="900" fill="#ffffff">Photosynthesis</text>
    <text x="872" y="494" font-family="Inter, Arial, sans-serif" font-size="14" fill="#bbf7d0">Light energy becomes stored</text>

    <rect x="852" y="548" width="244" height="86" rx="16" fill="#101827" stroke="#334155"/>
    <text x="872" y="577" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="900" fill="#f8fafc">Saved to history</text>
    <text x="872" y="604" font-family="Inter, Arial, sans-serif" font-size="14" fill="#cbd5e1">Answer, explanation and notes</text>
  </g>

  <path d="M770 374 C810 374 812 374 842 374" fill="none" stroke="url(#accent)" stroke-width="6" stroke-linecap="round"/>
  <path d="M831 358 L850 374 L831 390" fill="none" stroke="#8b5cf6" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
